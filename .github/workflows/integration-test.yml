name: Integration Tests

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  pull-requests: write
  actions: write

jobs:
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl crudini
      
      - name: Install 1Password CLI
        run: |
          curl -sSfLo op.zip https://cache.agilebits.com/dist/1P/op2/pkg/v2.24.0/op_linux_amd64_v2.24.0.zip
          unzip -od /usr/local/bin/ op.zip
          rm op.zip
          chmod +x /usr/local/bin/op
          op --version
      
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install splunk-sdk solnlib requests boto3 splunk-appinspect
      
      - name: Install Poetry
        run: |
          pip install poetry
          poetry --version
      
      - name: Install Poetry dependencies
        run: |
          poetry config virtualenvs.create true
          poetry install --no-root
      
      - name: Retrieve secrets from 1Password
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          source scripts/get_secrets_from_1password.sh
          echo "SPLUNKCLOUD_STACK_URL=${SPLUNKCLOUD_STACK_URL}" >> $GITHUB_ENV
          echo "SPLUNKCLOUD_ADMIN_USER=${SPLUNKCLOUD_ADMIN_USER}" >> $GITHUB_ENV
          echo "SPLUNKCLOUD_ADMIN_PASSWORD=${SPLUNKCLOUD_ADMIN_PASSWORD}" >> $GITHUB_ENV
          echo "ACS_STACK=${ACS_STACK}" >> $GITHUB_ENV
          echo "SPLUNKBASE_USERNAME=${SPLUNKBASE_USERNAME}" >> $GITHUB_ENV
          echo "SPLUNKBASE_PASSWORD=${SPLUNKBASE_PASSWORD}" >> $GITHUB_ENV
          echo "SPLUNKBASE_AUTH=${SPLUNKBASE_AUTH}" >> $GITHUB_ENV
          [ -n "$GITHUB_TOKEN" ] && echo "GITHUB_TOKEN=${GITHUB_TOKEN}" >> $GITHUB_ENV
          [ -n "$GITHUB_REPO" ] && echo "GITHUB_REPO=${GITHUB_REPO}" >> $GITHUB_ENV
          [ -n "$GITLAB_TOKEN" ] && echo "GITLAB_TOKEN=${GITLAB_TOKEN}" >> $GITHUB_ENV
          [ -n "$GITLAB_PROJECT_URL" ] && echo "GITLAB_PROJECT_URL=${GITLAB_PROJECT_URL}" >> $GITHUB_ENV
          [ -n "$AWS_ACCESS_KEY_ID" ] && echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}" >> $GITHUB_ENV
          [ -n "$AWS_SECRET_ACCESS_KEY" ] && echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}" >> $GITHUB_ENV
          [ -n "$AWS_DEFAULT_REGION" ] && echo "AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}" >> $GITHUB_ENV
          [ -n "$AWS_SECRET_NAME" ] && echo "AWS_SECRET_NAME=${AWS_SECRET_NAME}" >> $GITHUB_ENV
          [ -n "$OP_CONNECT_HOST" ] && echo "OP_CONNECT_HOST=${OP_CONNECT_HOST}" >> $GITHUB_ENV
          [ -n "$OP_CONNECT_TOKEN" ] && echo "OP_CONNECT_TOKEN=${OP_CONNECT_TOKEN}" >> $GITHUB_ENV
          echo "OP_SERVICE_ACCOUNT_TOKEN=${OP_SERVICE_ACCOUNT_TOKEN}" >> $GITHUB_ENV
      
      - name: Build app
        run: |
          make build
      
      - name: Package app
        run: |
          make dist
      
      - name: Upload to Splunk Cloud via ACS
        env:
          ACS_STACK: ${{ env.ACS_STACK }}
          SPLUNKCLOUD_ADMIN_USER: ${{ env.SPLUNKCLOUD_ADMIN_USER }}
          SPLUNKCLOUD_ADMIN_PASSWORD: ${{ env.SPLUNKCLOUD_ADMIN_PASSWORD }}
          SPLUNKBASE_TOKEN: ${{ env.SPLUNKBASE_AUTH }}
        run: |
          # Get ACS token using admin credentials
          export ACS_TOKEN=$(curl -k -s -u "${SPLUNKCLOUD_ADMIN_USER}:${SPLUNKCLOUD_ADMIN_PASSWORD}" \
            "https://${SPLUNKCLOUD_STACK_URL}:8089/services/auth/login" \
            -d "username=${SPLUNKCLOUD_ADMIN_USER}&password=${SPLUNKCLOUD_ADMIN_PASSWORD}" \
            | grep -oP '(?<=<sessionKey>)[^<]+')
          
          export STACK_TOKEN=$ACS_TOKEN
          scripts/acscli_upload.sh || {
            echo "ACS upload failed, but continuing with tests"
          }
      
      - name: Wait for app installation
        run: |
          echo "Waiting for app to be installed..."
          sleep 30
      
      - name: Obtain Splunk token
        env:
          SPLUNKCLOUD_STACK_URL: ${{ env.SPLUNKCLOUD_STACK_URL }}
          SPLUNK_PORT: '8089'
          SPLUNKCLOUD_ADMIN_USER: ${{ env.SPLUNKCLOUD_ADMIN_USER }}
          SPLUNKCLOUD_ADMIN_PASSWORD: ${{ env.SPLUNKCLOUD_ADMIN_PASSWORD }}
        run: |
          echo "SPLUNK_TOKEN=$(python3 scripts/obtain_splunk_token.py --format raw)" >> $GITHUB_ENV
      
      - name: Create test accounts
        env:
          SPLUNK_HOST: ${{ env.SPLUNKCLOUD_STACK_URL }}
          SPLUNK_PORT: '8089'
          SPLUNK_TOKEN: ${{ env.SPLUNK_TOKEN }}
          SPLUNKCLOUD_ADMIN_USER: ${{ env.SPLUNKCLOUD_ADMIN_USER }}
          SPLUNKCLOUD_ADMIN_PASSWORD: ${{ env.SPLUNKCLOUD_ADMIN_PASSWORD }}
        run: |
          python3 scripts/create_test_accounts.py \
            --host "${SPLUNK_HOST}" \
            --port "${SPLUNK_PORT}" \
            --username "${SPLUNKCLOUD_ADMIN_USER}" \
            --token "${SPLUNK_TOKEN}" \
            --scheme https \
            --output test_accounts.json
      
      - name: Configure app destinations
        env:
          SPLUNK_HOST: ${{ env.SPLUNKCLOUD_STACK_URL }}
          SPLUNK_PORT: '8089'
          SPLUNK_TOKEN: ${{ env.SPLUNK_TOKEN }}
          SPLUNKCLOUD_ADMIN_USER: ${{ env.SPLUNKCLOUD_ADMIN_USER }}
          SPLUNKCLOUD_ADMIN_PASSWORD: ${{ env.SPLUNKCLOUD_ADMIN_PASSWORD }}
          GITHUB_REPO: ${{ env.GITHUB_REPO }}
          GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
          GITLAB_PROJECT_URL: ${{ env.GITLAB_PROJECT_URL }}
          GITLAB_TOKEN: ${{ env.GITLAB_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_DEFAULT_REGION }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ env.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_CONNECT_HOST: ${{ env.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ env.OP_CONNECT_TOKEN }}
          OP_VAULT_NAME: 'cicd'
        run: |
          python3 scripts/configure_app_destinations.py \
            --host "${SPLUNK_HOST}" \
            --port "${SPLUNK_PORT}" \
            --username "${SPLUNKCLOUD_ADMIN_USER}" \
            --token "${SPLUNK_TOKEN}" \
            --scheme https \
            --from-env || {
            echo "Destination configuration failed, but continuing with tests"
          }
      
      - name: Generate test tokens
        env:
          SPLUNK_HOST: ${{ env.SPLUNKCLOUD_STACK_URL }}
          SPLUNK_PORT: '8089'
          SPLUNK_TOKEN: ${{ env.SPLUNK_TOKEN }}
          SPLUNKCLOUD_ADMIN_USER: ${{ env.SPLUNKCLOUD_ADMIN_USER }}
          SPLUNKCLOUD_ADMIN_PASSWORD: ${{ env.SPLUNKCLOUD_ADMIN_PASSWORD }}
        run: |
          python3 scripts/generate_test_tokens.py \
            --host "${SPLUNK_HOST}" \
            --port "${SPLUNK_PORT}" \
            --username "${SPLUNKCLOUD_ADMIN_USER}" \
            --token "${SPLUNK_TOKEN}" \
            --scheme https \
            --output token_results.json
      
      - name: Validate tokens
        env:
          GITHUB_REPO: ${{ env.GITHUB_REPO }}
          GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
          GITHUB_SECRET_NAME: 'SPLUNK_TOKEN'
          GITLAB_HOSTNAME: ${{ env.GITLAB_PROJECT_URL }}
          GITLAB_PROJECT_ID: ${{ env.GITLAB_PROJECT_ID }}
          GITLAB_TOKEN: ${{ env.GITLAB_TOKEN }}
          GITLAB_VARIABLE_NAME: 'ACS_TOKEN'
          AWS_DEFAULT_REGION: ${{ env.AWS_DEFAULT_REGION }}
          AWS_SECRET_NAME: ${{ env.AWS_SECRET_NAME || 'splunk/test-token' }}
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          OP_VAULT_NAME: 'cicd'
          OP_ITEM_TITLE: 'test-splunk-token'
          OP_ITEM_FIELD: 'password'
          OP_SERVICE_ACCOUNT_TOKEN: ${{ env.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          python3 scripts/validate_tokens.py \
            --from-env \
            --output validation_results.json || {
            echo "Some validations failed, but this may be expected"
          }
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: |
            test_accounts.json
            token_results.json
            validation_results.json
          retention-days: 7
      
      - name: Report results
        if: always()
        run: |
          echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f token_results.json ]; then
            echo "### Token Generation Results" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat token_results.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f validation_results.json ]; then
            echo "### Token Validation Results" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat validation_results.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

