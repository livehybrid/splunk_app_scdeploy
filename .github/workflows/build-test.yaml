name: Splunk App CI/CD
on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
permissions:
  pull-requests: write
  actions: write
  checks: write
jobs:
  # Package job inlined so version is computed in the workflow and passed to ucc-gen,
  # avoiding "Could not find the proper version from git tags" on tag pushes (e.g. v2026.01.28).
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: pip

      - name: Determine version
        id: version
        run: |
          SHORT_COMMIT_HASH=$(git rev-parse --short HEAD)
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          else
            TAG_VERSION="1.0.0"
          fi
          VERSION_WITH_HASH="${TAG_VERSION}+${SHORT_COMMIT_HASH}"
          echo "VERSION_WITH_HASH=${VERSION_WITH_HASH}" >> $GITHUB_OUTPUT
          echo "Using version: ${VERSION_WITH_HASH}"

      - name: Set up environment
        run: |
          echo "splunk-add-on-ucc-framework" > requirements_dev.txt
          pip install splunk-add-on-ucc-framework

      - name: Generate app with ucc-gen
        uses: splunk/addonfactory-ucc-generator-action@v3.0.0
        with:
          version: ${{ steps.version.outputs.VERSION_WITH_HASH }}

      - name: Generate package tarball
        run: |
          mkdir -p dist
          mv output/* output/app
          ucc-gen package -o dist --path output/app

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  appinspect:
    name: quality-appinspect
    needs: package
    uses: livehybrid/deploy-splunk-app-action/.github/workflows/appinspect-cli.yml@main
    with:
      tags: "cloud,future,private_victoria"
    secrets:
      token: "${{ secrets.GITHUB_TOKEN }}"

  quality-appinspect-api:
    name: quality-appinspect-api
    needs:
      - appinspect
    uses: livehybrid/deploy-splunk-app-action/.github/workflows/appinspect-api.yml@main
    secrets:
      splunkbase_username: ${{ secrets.SPLUNKBASE_USERNAME }}
      splunkbase_password: ${{ secrets.SPLUNKBASE_PASSWORD }}
  
  publish-gh:
    permissions:
      contents: write
    needs:
      - appinspect
    uses: livehybrid/deploy-splunk-app-action/.github/workflows/publish.yml@main